spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:h2:mem:notification
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

logging:
  level:
    com.jiron: DEBUG
    org.hibernate.SQL: DEBUG
